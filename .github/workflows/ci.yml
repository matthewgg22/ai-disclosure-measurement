name: ci

# Lightweight smoke test: proves every script compiles and the README figures
# regenerate from the committed aggregate data. NO network, NO SEC calls, NO
# issuer-level data, NO entity-denylist grep (the denylist is intentionally
# kept local, never committed to this public repo).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile every script
        run: python -m py_compile pipeline/*.py pipeline/event_study/*.py scripts/*.py

      - name: Install matplotlib (figure rendering only)
        run: python -m pip install "matplotlib>=3.7"

      - name: Regenerate README figures from committed aggregates
        run: python pipeline/make_figures.py

      - name: Structural public-safety check (schema + paths; denylist skipped in CI)
        run: python scripts/check_public_safe.py
